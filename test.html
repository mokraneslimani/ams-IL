<!DOCTYPE html>
<html>
<head>
    <title>Test Socket.io</title>
</head>
<body>

<h2>Test Socket.io - Chat Temps Réel</h2>
<h3>Vidéo synchronisée</h3>

<video id="video" width="600" controls>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  Votre navigateur ne supporte pas la vidéo HTML5.
</video>

<br><br>

<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>
<button onclick="seekVideo()">Avancer +5s</button>

<hr>

<label>Message :</label>
<input id="msg" type="text">
<button onclick="sendMessage()">Envoyer</button>

<div id="logs"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const socket = io("http://localhost:5000");

  const logs = document.getElementById("logs");

  function log(msg) {
    logs.innerHTML += "<p>" + msg + "</p>";
  }

  socket.on("connect", () => {
    log("Connecté au serveur : " + socket.id);

    // rejoindre la room 12345
    socket.emit("join_room", "12345");
  });

  function sendMessage() {
    const message = document.getElementById("msg").value;

    socket.emit("chat_message", {
      roomId: "12345",
      username: "Moi",
      message: message
    });

    document.getElementById("msg").value = "";
  }

  socket.on("chat_message", (data) => {
    log("Message reçu : " + data.username + " → " + data.message);
  });

  socket.on("user_joined", (data) => {
    log("Nouvel utilisateur : " + data.userId);
  });

const video = document.getElementById("video");

// --------------------------------
// PLAY LOCAL + envoi aux autres
// --------------------------------
function playVideo() {
    video.play();
    socket.emit("video_play", { roomId: "12345", currentTime: video.currentTime });
}

socket.on("video_play", (data) => {
    video.currentTime = data.currentTime;
    video.play();
});

// --------------------------------
// PAUSE LOCAL + envoi aux autres
// --------------------------------
function pauseVideo() {
    video.pause();
    socket.emit("video_pause", { roomId: "12345", currentTime: video.currentTime });
}

socket.on("video_pause", (data) => {
    video.currentTime = data.currentTime;
    video.pause();
});

// --------------------------------
// SEEK LOCAL + envoi aux autres
// --------------------------------
function seekVideo() {
    video.currentTime += 5;
    socket.emit("video_seek", { roomId: "12345", currentTime: video.currentTime });
}

socket.on("video_seek", (data) => {
    video.currentTime = data.currentTime;
});

</script>

</body>
</html>
