<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Socket.io + YouTube Sync</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f2f2f2;
        }
        h2 {
            color: #333;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 900px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }
        .section {
            margin-bottom: 25px;
        }
        #logs {
            background: black;
            color: #00ff00;
            font-family: monospace;
            height: 150px;
            overflow-y: scroll;
            padding: 10px;
            border-radius: 5px;
        }
        #player {
            width: 640px;
            height: 360px;
            background: #000;
            margin-bottom: 15px;
        }
        button {
            padding: 8px 15px;
            margin-right: 10px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
        input {
            padding: 8px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #bbb;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>🔵 Test Temps Réel — Socket.io + YouTube Sync</h2>

    <!-- YouTube Link Loader -->
    <div class="section">
        <h3>📺 Charger une vidéo YouTube</h3>
        <input id="ytLink" placeholder="Colle un lien YouTube...">
        <button onclick="loadNewVideo()">Charger</button>
    </div>

    <!-- YouTube Player Section -->
    <div class="section">
        <h3>YouTube synchronisé</h3>

        <!-- lecteur youtube -->
        <div id="player"></div>

        <button onclick="playYT()">▶ Play</button>
        <button onclick="pauseYT()">⏸ Pause</button>
        <button onclick="seekYT()">⏩ Avancer +5s</button>
    </div>

    <!-- Chat section -->
    <div class="section">
        <h3>💬 Chat Temps Réel</h3>
        <input id="msg" placeholder="Tape ton message...">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

    <!-- Logs -->
    <div class="section">
        <h3>📜 Logs</h3>
        <div id="logs"></div>
    </div>

</div>

<!-- Socket.io -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- API YouTube -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const socket = io("http://localhost:5000");
    const logs = document.getElementById("logs");

    function log(msg) {
        logs.innerHTML += "<p>" + msg + "</p>";
        logs.scrollTop = logs.scrollHeight;
    }

    // ---------------------------
    // Connexion & join room
    // ---------------------------
    socket.on("connect", () => {
        log("🟢 Connecté : " + socket.id);
        socket.emit("join_room", "12345");
    });

    socket.on("user_joined", (d) => log("👤 Nouvel utilisateur : " + d.userId));

    // ---------------------------
    // Chat système
    // ---------------------------
    function sendMessage() {
        const message = document.getElementById("msg").value;
        if (!message) return;

        socket.emit("chat_message", {
            roomId: "12345",
            username: "Moi",
            message
        });

        document.getElementById("msg").value = "";
    }

    socket.on("chat_message", (d) => {
        log("💬 " + d.username + " : " + d.message);
    });

    // ---------------------------
    // YouTube Player Setup
    // ---------------------------
    let player;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
            height: "360",
            width: "640",
            videoId: "M7lc1UVf-VE",
            events: {
                onReady: () => log("🎥 YouTube prêt"),
                onStateChange: onPlayerStateChange
            }
        });
    }

    // ---------------------------
    // Extraire ID d'un lien YouTube
    // ---------------------------
    function extractVideoId(url) {
        const reg = /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([^"?&\/]+)/;
        const match = url.match(reg);
        return match ? match[1] : null;
    }

    // ---------------------------
    // Charger une nouvelle vidéo
    // ---------------------------
    function loadNewVideo() {
        const url = document.getElementById("ytLink").value;
        const videoId = extractVideoId(url);

        if (!videoId) {
            log("❌ Lien YouTube invalide");
            return;
        }

        log("📺 Nouvelle vidéo : " + videoId);

        player.cueVideoById(videoId);
        setTimeout(() => player.playVideo(), 200);

        socket.emit("change_video", { roomId: "12345", videoId });
    }

    socket.on("change_video", (d) => {
        log("🔄 Vidéo changée : " + d.videoId);
        player.cueVideoById(d.videoId);
        setTimeout(() => player.playVideo(), 200);
    });

    // ---------------------------
    // Actions locales + réseau
    // ---------------------------
    function playYT() {
        player.playVideo();
        socket.emit("video_play", { roomId: "12345", currentTime: player.getCurrentTime() });
    }

    socket.on("video_play", (data) => {
        player.seekTo(data.currentTime, true);
        player.playVideo();
        log("▶ Lecture reçue");
    });

    function pauseYT() {
        player.pauseVideo();
        socket.emit("video_pause", { roomId: "12345", currentTime: player.getCurrentTime() });
    }

    socket.on("video_pause", (data) => {
        player.seekTo(data.currentTime, true);
        player.pauseVideo();
        log("⏸ Pause reçue");
    });

    function seekYT() {
        const t = player.getCurrentTime() + 5;
        player.seekTo(t, true);
        socket.emit("video_seek", { roomId: "12345", currentTime: t });
    }

    socket.on("video_seek", (data) => {
        player.seekTo(data.currentTime, true);
        log("⏩ Seek reçu");
    });

    // Détection automatique 
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            socket.emit("video_play", {
                roomId: "12345",
                currentTime: player.getCurrentTime()
            });
        }

        if (event.data === YT.PlayerState.PAUSED) {
            socket.emit("video_pause", {
                roomId: "12345",
                currentTime: player.getCurrentTime()
            });
        }
    }
</script>

</body>
</html>
